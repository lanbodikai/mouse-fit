services:
  postgres:
    image: postgres:16-alpine
    container_name: mousefit-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mousefit}
      - POSTGRES_USER=${POSTGRES_USER:-mousefit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mousefit}
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    networks:
      - mousefit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mousefit} -d ${POSTGRES_DB:-mousefit}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mousefit-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Defaults to local Docker Postgres. Override with DATABASE_URL to use Supabase.
      - DATABASE_URL=${DATABASE_URL:-postgresql://mousefit:mousefit@postgres:5432/mousefit}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - MOUSEFIT_WARMUP_RAG=${MOUSEFIT_WARMUP_RAG:-0}
      - MOUSEFIT_AUTO_SCHEMA_INIT=${MOUSEFIT_AUTO_SCHEMA_INIT:-0}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MOUSEFIT_EMBED_MODEL=${MOUSEFIT_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - ENABLE_AUTH=${ENABLE_AUTH:-1}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-}
      - SUPABASE_JWT_ISSUER=${SUPABASE_JWT_ISSUER:-}
      - SUPABASE_JWT_AUDIENCE=${SUPABASE_JWT_AUDIENCE:-authenticated}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/backend/rag/chroma:/app/backend/rag/chroma
    networks:
      - mousefit-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mousefit-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # This value is used by the browser. Prefer IPv4 on Windows because localhost
      # may resolve to ::1 and hang behind WSL/Docker port forwarding.
      - NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000
      - NEXT_PUBLIC_ENABLE_AUTH=${NEXT_PUBLIC_ENABLE_AUTH:-1}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXT_PUBLIC_USE_SERVER_REPORT_PIPELINE=${NEXT_PUBLIC_USE_SERVER_REPORT_PIPELINE:-0}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - CONTACT_FROM=${CONTACT_FROM:-}
      - WELCOME_EMAIL_FROM=${WELCOME_EMAIL_FROM:-}
      - WELCOME_EMAIL_REPLY_TO=${WELCOME_EMAIL_REPLY_TO:-}
      - WELCOME_EMAIL_SUBJECT=${WELCOME_EMAIL_SUBJECT:-Welcome to MouseFit}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mousefit-network

networks:
  mousefit-network:
    driver: bridge

volumes:
  postgres-data-local:
