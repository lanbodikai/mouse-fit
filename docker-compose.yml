version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mousefit-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - MOUSEFIT_WARMUP_RAG=${MOUSEFIT_WARMUP_RAG:-1}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_URL=${GROQ_URL:-https://api.groq.com/openai/v1/chat/completions}
      - GROQ_DEFAULT_MODEL=${GROQ_DEFAULT_MODEL:-llama-3.3-70b-versatile}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_DEFAULT_MODEL=${XAI_DEFAULT_MODEL:-grok-3-mini-latest}
      - MOUSEFIT_EMBED_MODEL=${MOUSEFIT_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./backend/data:/app/data
      - ./backend/backend/rag/chroma:/app/backend/rag/chroma
    networks:
      - mousefit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: mousefit-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # This value is used by the browser, so it must be reachable from your machine.
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mousefit-network

networks:
  mousefit-network:
    driver: bridge
