version: '3.8'

x-mousefit-build-args: &mousefit-build-args
  # Default source for shared runtime/build env values.
  # Override this in your shell if you host env elsewhere:
  # MOUSEFIT_ENV_URL=https://... docker compose build
  MOUSEFIT_ENV_URL: ${MOUSEFIT_ENV_URL:-https://raw.githubusercontent.com/lanbodikai/mouse-fit/main/.env.compose}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        <<: *mousefit-build-args
    container_name: mousefit-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - MOUSEFIT_WARMUP_RAG=${MOUSEFIT_WARMUP_RAG:-1}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MOUSEFIT_EMBED_MODEL=${MOUSEFIT_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./backend/data:/app/data
      - ./backend/backend/rag/chroma:/app/backend/rag/chroma
    networks:
      - mousefit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        <<: *mousefit-build-args
    container_name: mousefit-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # This value is used by the browser, so it must be reachable from your machine.
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mousefit-network

networks:
  mousefit-network:
    driver: bridge
